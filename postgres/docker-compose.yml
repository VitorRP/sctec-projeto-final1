services:
  database:
    image: postgres:18-alpine
    container_name: sctec-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sctec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18/data
      - ../sql/dml/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  pgdata: